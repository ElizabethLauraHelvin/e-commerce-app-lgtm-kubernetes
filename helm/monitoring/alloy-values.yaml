controller:
  type: daemonset

alloy:
  configMap:
    create: true
    content: |
      logging {
        level = "info"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.logs.receiver]
      }

      loki.process "logs" {
        stage.regex {
          expression = "(?i)(?P<level>(error|warn|warning|info|debug|fatal|panic|critical))"
        }

        stage.labels {
          values = {
            level = "",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

      discovery.kubernetes "pods_metrics" {
        role = "pod"
      }

      discovery.relabel "metrics" {
        targets = discovery.kubernetes.pods_metrics.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
        }

        rule {
          source_labels = [
            "__address__",
            "__meta_kubernetes_pod_annotation_prometheus_io_port",
          ]
          regex        = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement  = "$1:$2"
          target_label = "__address__"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pods" {
        targets         = discovery.relabel.metrics.output
        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "15s"
      }

      prometheus.scrape "kube_state_metrics" {
        targets = [
          {
            "__address__" = "monitoring-kube-state-metrics.monitoring.svc.cluster.local:8080",
            "job"         = "kube-state-metrics",
          },
        ]

        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "15s"
      }

      prometheus.scrape "node_exporter" {
        targets = [
          {
            "__address__" = "monitoring-prometheus-node-exporter.monitoring.svc.cluster.local:9100",
            "job"         = "node-exporter",
          },
        ]

        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "15s"
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.monitoring.svc.cluster.local/api/v1/push"
        }
      }