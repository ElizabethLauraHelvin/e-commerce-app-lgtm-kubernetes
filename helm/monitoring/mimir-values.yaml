mimir:
  structuredConfig:

    multitenancy_enabled: false

    blocks_storage:
      backend: azure
      azure:
        account_name: "stcrossplaneloki"
        account_key: "w5V71mE/38rIwizvy0jIuVLMBlpfGDF69j8XOZAKiVGa0+S2pQVdLCEMlTr2QPl1JSTKm2V4ABsl+AStySvz3Q=="
        container_name: "mimir-blocks"

    ruler_storage:
      backend: azure
      azure:
        account_name: "stcrossplaneloki"
        account_key: "w5V71mE/38rIwizvy0jIuVLMBlpfGDF69j8XOZAKiVGa0+S2pQVdLCEMlTr2QPl1JSTKm2V4ABsl+AStySvz3Q=="
        container_name: "mimir-ruler"

    alertmanager_storage:
      backend: azure
      azure:
        account_name: "stcrossplaneloki"
        account_key: "w5V71mE/38rIwizvy0jIuVLMBlpfGDF69j8XOZAKiVGa0+S2pQVdLCEMlTr2QPl1JSTKm2V4ABsl+AStySvz3Q=="
        container_name: "mimir-alertmanager"

    limits:
      compactor_blocks_retention_period: 30d

# -----------------------------
# Distributor
# -----------------------------
distributor:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


# -----------------------------
# Ingester
# -----------------------------
ingester:
  replicas: 3

  persistentVolume:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi


# -----------------------------
# Querier
# -----------------------------
querier:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


# -----------------------------
# Query Frontend
# -----------------------------
query_frontend:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi


# -----------------------------
# Query Scheduler
# -----------------------------
query_scheduler:
  replicas: 2


# -----------------------------
# Store Gateway
# -----------------------------
store_gateway:
  replicas: 2

  persistentVolume:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi


# -----------------------------
# Compactor
# -----------------------------
compactor:
  replicas: 1

  persistentVolume:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi


# -----------------------------
# Ruler
# -----------------------------
ruler:
  replicas: 1


# -----------------------------
# Alertmanager
# -----------------------------
alertmanager:
  replicas: 1

  persistentVolume:
    enabled: true
    size: 5Gi


# -----------------------------
# Mimir Gateway
# -----------------------------
gateway:
  enabled: true

  replicas: 2

  service:
    type: ClusterIP