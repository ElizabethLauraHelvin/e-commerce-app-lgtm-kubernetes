grafana:
  adminUser: admin
  adminPassword: admin123

  service:
    type: ClusterIP

  grafana.ini:
    server:
      root_url: http://20.239.125.172/grafana
      serve_from_sub_path: true
  
  sidecar:
    datasources:
      defaultDatasourceEnabled: false

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      editable: true

    - name: Mimir
      type: prometheus
      uid: mimir
      access: proxy
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      isDefault: t
      editable: true
      jsonData:
        httpMethod: POST


alertmanager:
  enabled: true

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    externalUrl: http://20.239.125.172/prometheus

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
