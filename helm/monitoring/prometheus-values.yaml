grafana:
  adminUser: admin
  adminPassword: admin123

  service:
    type: ClusterIP

  grafana.ini:
    server:
      root_url: http://20.195.104.5/grafana
      serve_from_sub_path: true
  
  sidecar:
    datasources:
      defaultDatasourceEnabled: false

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      editable: true


    - name: Mimir-Pods
      type: prometheus
      access: proxy
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      jsonData:
        httpMethod: POST
        prometheusType: Mimir
        httpHeaderName1: X-Scope-OrgID
      secureJsonData:
        httpHeaderValue1: pods

    - name: Mimir-Nodes
      type: prometheus
      access: proxy
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      jsonData:
        httpMethod: POST
        prometheusType: Mimir
        httpHeaderName1: X-Scope-OrgID
      secureJsonData:
        httpHeaderValue1: nodes
    
    # ==========================================
    # Mimir - Tempo Generated Metrics
    # ==========================================
    - name: Mimir-Traces
      type: prometheus
      uid: mimir-traces
      access: proxy
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      editable: true
      jsonData:
        httpMethod: POST
        prometheusType: Mimir
        httpHeaderName1: X-Scope-OrgID
      secureJsonData:
        httpHeaderValue1: traces

    # ==========================================
    # Tempo
    # ==========================================
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo-query-frontend.monitoring.svc.cluster.local:3200
      isDefault: false
      editable: true

      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true

        tracesToMetrics:
          datasourceUid: mimir-traces
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"

        serviceMap:
          datasourceUid: mimir-traces

        nodeGraph:
      
    - name: Pyroscope
      type: grafana-pyroscope-datasource
      uid: pyroscope
      access: proxy
      url: http://pyroscope-query-frontend.monitoring.svc.cluster.local:4040
      isDefault: false
      editable: true


alertmanager:
  enabled: true

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    externalUrl: http://20.195.104.5/prometheus

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
