grafana:
  adminUser: admin
  adminPassword: admin123

  service:
    type: ClusterIP

  grafana.ini:
    server:
      root_url: http://20.239.125.172/grafana
      serve_from_sub_path: true
  
  sidecar:
    datasources:
      defaultDatasourceEnabled: false

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      editable: true

    - name: Mimir
      type: prometheus
      uid: mimir
      access: proxy
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      isDefault: true
      editable: true
      jsonData:
        httpMethod: POST
    
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo-query-frontend.monitoring.svc.cluster.local:3200
      isDefault: false
      editable: true

      jsonData:
        # ----------------------------------------------------
        # Trace -> Logs
        # Menghubungkan Tempo dengan Loki
        # ----------------------------------------------------
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true

        # ----------------------------------------------------
        # Trace -> Metrics
        # Menghubungkan Tempo dengan Mimir
        # ----------------------------------------------------
        tracesToMetrics:
          datasourceUid: mimir
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"

        # ----------------------------------------------------
        # Service Graph / Node Graph
        # ----------------------------------------------------
        serviceMap:
          datasourceUid: mimir

        nodeGraph:
          enabled: true


alertmanager:
  enabled: true

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    externalUrl: http://20.239.125.172/prometheus

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
