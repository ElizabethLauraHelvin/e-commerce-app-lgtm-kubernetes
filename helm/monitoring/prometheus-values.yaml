grafana:
  adminUser: admin
  adminPassword: admin123

  service:
    type: ClusterIP

  grafana.ini:
    server:
      root_url: http://57.155.73.187/grafana
      serve_from_sub_path: true
  
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      editable: true


    - name: Mimir
      type: prometheus
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus

alertmanager:
  enabled: true

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    remoteWrite:
      - url: http://mimir-gateway.monitoring.svc.cluster.local/api/v1/push

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
